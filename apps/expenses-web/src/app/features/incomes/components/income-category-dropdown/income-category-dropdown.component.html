<p-floatLabel>
    <p-select [(ngModel)]="value" styleClass="w-full" class="w-full" inputId="category" [options]="options"
        [disabled]="disabled" [showClear]="showClear" (onChange)="valueChanged($event.value)" >
        <ng-template pTemplate="selectedItem" let-selectedOption>
            {{ selectedOption.label | translate }}
        </ng-template>

        <ng-template pTemplate="item" let-option>
            {{ option.label | translate }}
        </ng-template>
    </p-select>
    <label for="category">{{'incomes.categoryInput.label' | translate}}</label>
</p-floatLabel>
